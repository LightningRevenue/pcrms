      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm
      REDIS_URL: redis://redis:6379

  stripe-reconcile-worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        WORKER_ENTRY: worker/stripe-reconcile-worker.ts
    restart: unless-stopped
